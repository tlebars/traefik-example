http:
  middlewares:
    # À utiliser avec le label :
    # "traefik.http.routers.MONROUTEUR.middlewares=headers@file"
    headers:
      headers:
        accessControlAllowMethods:
          - GET
          - POST
        frameDeny: true
        contentTypeNosniff: true
        browserXssFilter: true
        referrerPolicy: "no-referrer"
        permissionsPolicy: "camera=(), geolocation=(), microphone=()"
        stsIncludeSubdomains: true
        stsPreload: true
        stsSeconds: 63072000
        customFrameOptionsValue: "DENY"
        forceSTSHeader: true
        contentSecurityPolicy: "XXXXXXXXX"
        isDevelopment: false

tls:
  options:
    # À utiliser avec le label :
    # "traefik.http.routers.MONROUTEUR.tls.options=modern@file"
    modern:
      minVersion: "VersionTLS13"
      sniStrict: true
    # À utiliser avec le label :
    # "traefik.http.routers.MONROUTEUR.tls.options=intermediate@file"
    intermediate:
      cipherSuites:
        - "TLS_ECDHE_ECDSA_WITH_AES_128_GCM_SHA256"
        - "TLS_ECDHE_RSA_WITH_AES_128_GCM_SHA256"
        - "TLS_ECDHE_ECDSA_WITH_AES_256_GCM_SHA384"
        - "TLS_ECDHE_RSA_WITH_AES_256_GCM_SHA384"
        - "TLS_ECDHE_ECDSA_WITH_CHACHA20_POLY1305"
        - "TLS_ECDHE_RSA_WITH_CHACHA20_POLY1305"
      minVersion: "VersionTLS12"
      sniStrict: true
