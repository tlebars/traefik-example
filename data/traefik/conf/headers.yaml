http:
  middlewares:
    # À utiliser avec le label :
    # "traefik.http.routers.EXEMPLE.middlewares=headers@file"
    headers:
      headers:
        accessControlAllowMethods:
          - GET
          - POST
        frameDeny: true
        contentTypeNosniff: true
        browserXssFilter: true
        referrerPolicy: "no-referrer"
        permissionsPolicy: "camera=(), geolocation=(), microphone=()"
        stsIncludeSubdomains: true
        stsPreload: true
        stsSeconds: 63072000
        customFrameOptionsValue: "DENY"
        forceSTSHeader: true
        isDevelopment: false
